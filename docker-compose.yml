version: '3.8'

services:
  # =============================================
  # BASE DE DATOS: PostgreSQL
  # =============================================
  db:
    image: postgres:15-alpine
    container_name: inventario_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: inventario_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventario_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario_user -d inventario_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # BACKEND: Node.js + Express
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventario_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8081
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: inventario_db
      DB_USER: inventario_user
      DB_PASSWORD: ${DB_PASSWORD:-inventario_secret_2024}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-cambiar_este_secreto_en_produccion}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    ports:
      - "8081:8081"
    volumes:
      - ./backend:/app
      - /app/node_modules

  # =============================================
  # FRONTEND: React + Vite (dev)
  # =============================================
  frontend:
    image: node:20-alpine
    container_name: inventario_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8081/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
    name: inventario_postgres_data
