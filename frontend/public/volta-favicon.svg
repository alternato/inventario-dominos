<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo azul con borde blanco interior -->
  <rect width="64" height="64" rx="12" fill="#008ce7"/>
  <!-- Borde blanco interior sutil (efecto glow) -->
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

  <!-- "V" blanca bold italic -->
  <text
    x="32"
    y="50"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
    font-size="56"
    font-weight="900"
    font-style="italic"
    fill="white"
    letter-spacing="-2"
    style="filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3))"
  >V</text>

  <!-- Punto rojo en esquina inferior derecha -->
  <circle cx="55" cy="54" r="5" fill="#E31837"/>
</svg>
